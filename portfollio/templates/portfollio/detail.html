{% extends "portfollio/base.html" %}

{% block content %}
<section class="py-5">
  <div class="container">

    <a href="/" class="text-decoration-none mb-4 d-inline-block">
      ← Back to Projects
    </a>

    <h1 class="fw-bold mb-3">{{ project.title }}</h1>

    {% if project.image %}
    <img src="{{ project.image.url }}"
         class="img-fluid rounded shadow-sm mb-4"
         alt="{{ project.title }}">
    {% endif %}

    <!-- Structured Description -->
    <div class="project-description text-muted">
      {{ project.description|linebreaks }}
    </div>

    {% if project.url %}
    <a href="{{ project.url }}"
       target="_blank"
       class="btn btn-dark mt-4">
      View Project
    </a>
    {% endif %}

  </div>
</section>
{% endblock %}
